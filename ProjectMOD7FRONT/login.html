<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="icon" type="image/png" sizes="16x16" href="img/icon-Alke-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/icon-Alke-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="img/icon-Alke-48.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="overflow-y-scroll">
    <div class="container my-5">
        <div class="auth-container">

            <div class="main-title text-center">Películas</div>

            <div class="card-auth">

                <h4 class="text-center mb-3 text-dark">Iniciar sesión</h4>
                <p class="text-light-custom text-center mb-4">
                    Ingresa tus credenciales
                </p>

                <form id="loginForm" novalidate>

                    <div class="mb-3">
                        <label class="text-light-custom mb-1">Email:</label>
                        <input class="form-control alert-input" type="email" id="emailLogin"
                            placeholder="correo@dominio.com">
                    </div>

                    <div class="mb-3">
                        <label class="text-light-custom mb-1">Contraseña:</label>
                        <input class="form-control alert-input" type="password" id="claveLogin" placeholder="••••••••">
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <label class="text-light-custom">
                            <input type="checkbox" id="chkRemember">
                            Recordarme
                        </label>
                    </div>

                    <button class="btn btn-main w-100" type="submit" id="btnLogin">
                        Iniciar sesión
                    </button>

                </form>

                <div class="divider"></div>

                <p class="text-center text-light-custom">
                    ¿No tienes cuenta?
                </p>

                <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#registroModal">
                    Crear cuenta
                </button>

                <div class="text-center mt-3">
                    <button id="guestBtn" class="btn btn-dark w-100">
                        Entrar como invitado
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="registroModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content card-auth">
                <div class="modal-header bg-light">
                    <h4 id="formTitle" class="modal-title">Crear Usuario</h4>
                    <button id="closeForm" type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm" novalidate>
                        <div class="row">
                            <div class="mb-3 w-50">
                                <label for="nombre" class="form-label">Nombre:</label>
                                <input type="text" id="nombre" class="form-control pe-0 alert-input"
                                    placeholder="nombre..." required>
                            </div>
                            <div class="mb-3 w-50">
                                <label for="apellido" class="form-label">Apellido:</label>
                                <input type="text" id="apellido" class="form-control pe-0 alert-input"
                                    placeholder="apellido..." required>
                            </div>
                        </div>
                        <div class="mb-3 w-75">
                            <label for="regEmail" class="form-label">Correo Electrónico:</label>
                            <input type="email" id="regEmail" class="form-control alert-input"
                                placeholder="correo electrónico..." required>
                        </div>
                        <div class="mb-3 w-75">
                            <label for="regClave" class="form-label">Contraseña:</label>
                            <input type="password" id="regClave" class="form-control alert-input"
                                placeholder="contraseña" required>
                        </div>
                        <div class="mb-3 w-75">
                            <label for="regClaveRepeat" class="form-label">Confirme Contraseña:</label>
                            <input type="password" id="regClaveRepeat" class="form-control alert-input"
                                placeholder="repetir contraseña" required>
                        </div>
                        <button class="btn btn-primary" type="submit" id="register">Registrarse</button>
                    </form>
                </div>
                <div class="modal-footer">
                    <button id="cancelForm" class="btn btn-dark" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="globalAlert" class="dlgOverlay" style="display:none;">
        <div id="alertBox" class="d-flex flex-column gap-2 text-center p-3 rounded-3">

            <h5 id="alertTitle" class="mb-1"></h5>
            <p id="alertMessage" class="mb-2"></p>

            <div id="alertButtons" class="d-flex justify-content-center gap-2">
                <!-- botones dinámicos -->
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js/alertAnimations.js"></script>
    <script src="js/alert.js"></script>
    <script src="js/register.js"></script>
    <script src="js/login.js"></script>
    <script src="js/get_cookie.js"></script>
</body>

</html>
