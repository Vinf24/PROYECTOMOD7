<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <link rel="icon" type="image/png" sizes="16x16" href="../img/icon-Alke-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../img/icon-Alke-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="../img/icon-Alke-48.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="overflow-y-scroll">
    <div class="navbar nav-stack d-flex justify-content-end gap-2 px-3">

        <button id="loginBtn" class="btn btn-primary d-none">
            Iniciar sesión
        </button>

        <button id="perfilBtn" class="btn btn-soft d-none">
            Perfil
        </button>

        <button id="cuentaBtn" class="btn btn-primary d-none">
            Cuenta
        </button>

        <button id="logoutBtn" class="btn btn-danger d-none">
            Cerrar sesión
        </button>

    </div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-12 col-md-10 col-lg-8">
                <div class="main-title text-center">Películas</div>
                <div class="max-container">
                    <div class="movies-tarjeta p-3 mb-3">
                        <div class="row g-2">

                            <div class="col-12 col-md-6">
                                <label class="form-label fw-bold text-light">Ordenar por:</label>
                                <select id="filtroTipo" class="form-select">
                                    <option value="Todas">Todas</option>
                                    <option value="mejor_valoradas">Mejor valoradas</option>
                                    <option value="mas_reseñadas">Más reseñadas</option>
                                    <option value="orden_alfabético">Orden alfabético</option>
                                </select>
                            </div>

                            <div class="col-12 col-md-6 d-flex align-items-end">
                                <input type="text" id="searchInput" class="form-control"
                                    placeholder="Buscar película...">
                            </div>

                        </div>
                    </div>
                    <div class="tarjeta p-3">
                        <div id="movieList" class="row g-3">
                            <li class="list-group-item text-light text-center">
                                No hay peliculas
                            </li>
                        </div>
                    </div>
                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <button id="prevPage" class="btn btn-soft btn-sm">Anterior</button>
                        <button id="nextPage" class="btn btn-soft btn-sm">Siguiente</button>
                    </div>

                    <div class="text-center mt-2">
                        <span id="pageInfo" class="text-light"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="globalAlert" class="dlgOverlay" style="display:none;">
        <div id="alertBox" class="d-flex flex-column gap-2 text-center p-3 rounded-3">

            <h5 id="alertTitle" class="mb-1"></h5>
            <p id="alertMessage" class="mb-2"></p>

            <div id="alertButtons" class="d-flex justify-content-center gap-2">
                <!-- botones dinámicos -->
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js/alertAnimations.js"></script>
    <script src="js/alert.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/get_cookie.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
