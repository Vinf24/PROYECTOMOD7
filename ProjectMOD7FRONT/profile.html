<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="icon" type="image/png" sizes="16x16" href="img/icon-Alke-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/icon-Alke-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="img/icon-Alke-48.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="overflow-y-scroll">
    <div class="navbar nav-stack d-flex justify-content-end gap-2 px-3">
        <a href="main.html" class="btn btn-primary mt-1 surf" data-title="Menú Principal">Volver al
            Menú
            Principal</a>
    </div>
    <div class="container my-5 sub-nav">
        <div class="tarjeta p-4 text-center">
            <div class="main-title text-center">Perfil</div>

            <img id="profileImage" src="img/profiles/default.png" class="profile-img my-3" width="120">

            <h4 id="alias">Sin alias</h4>

            <p id="bio" class="text-light">Sin descripción</p>

            <button id="editProfileBtn" class="btn btn-main d-none">
                Editar perfil
            </button>

            <button id="cancelEditBtn" class="btn btn-secondary d-none">
                Cancelar
            </button>

            <input type="file" id="imageInput" class="form-control mt-2 d-none" accept="image/*">

            <h3 class="mt-4">Mis reseñas</h3>

            <input type="text" id="searchReviews" class="form-control mb-3" placeholder="Buscar por película...">

            <div id="myReviewsContainer" class="mt-3"></div>

            <div class="d-flex justify-content-center gap-2 mt-3">
                <button id="prevReviews" class="btn btn-soft btn-sm">Anterior</button>
                <button id="nextReviews" class="btn btn-soft btn-sm">Siguiente</button>
            </div>

            <div class="text-center mt-2">
                <span id="reviewsPageInfo" class="text-light"></span>
            </div>

        </div>
    </div>

    <div id="globalAlert" class="dlgOverlay" style="display:none;">
        <div id="alertBox" class="d-flex flex-column gap-2 text-center p-3 rounded-3">

            <h5 id="alertTitle" class="mb-1"></h5>
            <p id="alertMessage" class="mb-2"></p>

            <div id="alertButtons" class="d-flex justify-content-center gap-2">
                <!-- botones dinámicos -->
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js/alertAnimations.js"></script>
    <script src="js/alert.js"></script>
    <script src="js/get_cookie.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
