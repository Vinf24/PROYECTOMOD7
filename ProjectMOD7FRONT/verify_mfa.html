<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar MFA</title>
    <link rel="icon" type="image/png" sizes="16x16" href="img/icon-Alke-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/icon-Alke-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="img/icon-Alke-48.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-container mt-5">
        <div class="card-auth text-center">

            <h3 class="mb-2 text-dark">Verificación MFA</h3>

            <p id="mfaEmailText" class="text-light-custom">
                Ingresa el código enviado a tu correo
            </p>

            <p id="mfaTimer" class="text-light-custom small mb-3"></p>

            <form id="mfaForm">

                <input type="text" id="mfaCode" class="form-control alert-input text-center mb-3" placeholder="123456"
                    maxlength="6" required>

                <p id="attemptsText" class="text-light-custom small mb-2"></p>

                <button class="btn btn-main w-100 mb-2" id="mfa-btn">
                    Verificar
                </button>

                <button type="button" id="resendBtn" class="btn btn-soft w-100">
                    Reenviar código
                </button>

            </form>

        </div>
    </div>

    <div id="globalAlert" class="dlgOverlay" style="display:none;">
        <div id="alertBox" class="d-flex flex-column gap-2 text-center p-3 rounded-3">

            <h5 id="alertTitle" class="mb-1"></h5>
            <p id="alertMessage" class="mb-2"></p>

            <div id="alertButtons" class="d-flex justify-content-center gap-2">
            </div>

        </div>
    </div>

    <script src="js/alertAnimations.js"></script>
    <script src="js/alert.js"></script>
    <script src="js/verify_mfa.js"></script>
    <script src="js/get_cookie.js"></script>
</body>

</html>
