<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>
    <link rel="icon" type="image/png" sizes="16x16" href="img/icon-Alke-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/icon-Alke-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="img/icon-Alke-48.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="overflow-y-scroll">

    <div class="navbar nav-stack d-flex justify-content-end gap-2 px-3">
        <a href="index.html" class="btn btn-primary border border-light mt-1">
            Volver al Menú Principal
        </a>
    </div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-12 col-md-10 col-lg-8">

                <div class="main-title text-center">Listado de Usuarios</div>

                <div class="max-container">

                    <div class="tarjeta p-3 mb-3">
                        <div class="row g-2">

                            <div class="col-12 col-sm-12 col-md-10 col-lg-8">
                                <label class="form-label fw-bold text-light">Filtrar por estado:</label>
                                <select id="filterSelect" class="form-select">
                                    <option value="true">Activos</option>
                                    <option value="false">Inactivos</option>
                                    <option value="all" selected>Todos</option>
                                </select>
                            </div>

                            <div class="col-12 col-md-6 d-flex align-items-end">
                                <input type="text" id="searchInput" class="form-control"
                                    placeholder="Buscar usuario...">
                            </div>

                        </div>
                    </div>

                    <div class="tarjeta p-3">
                        <div id="usersList" class="row g-3">

                            <div class="col-12 text-center text-light">
                                No hay usuarios
                            </div>
                        </div>
                        <div class="d-flex justify-content-center gap-2 mt-3">
                            <button id="prevPage" class="btn btn-soft btn-sm">Anterior</button>
                            <button id="nextPage" class="btn btn-soft btn-sm">Siguiente</button>
                        </div>

                        <div class="text-center mt-2">
                            <span id="pageInfo" class="text-light"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header bg-light">
                    <h5 class="modal-title">Editar Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="editUserForm">

                        <div class="mb-2">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="editNames" class="form-control alert-input" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Apellido</label>
                            <input type="text" id="editLastnames" class="form-control alert-input" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Nueva contraseña</label>
                            <input type="password" id="editPassword" class="form-control alert-input">
                        </div>

                        <div class="form-check">
                            <input type="checkbox" id="editMFA" class="form-check-input">
                            <label class="form-check-label">MFA requerido</label>
                        </div>

                        <div class="form-check">
                            <input type="checkbox" id="editActive" class="form-check-input">
                            <label class="form-check-label">Usuario activo</label>
                        </div>

                    </form>
                </div>

                <div class="modal-footer">
                    <button id="saveEditUser" class="btn btn-primary">Guardar</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                </div>

            </div>
        </div>
    </div>

    <div id="globalAlert" class="dlgOverlay" style="display:none;">
        <div id="alertBox" class="d-flex flex-column gap-2 text-center p-3 rounded-3">
            <h5 id="alertTitle"></h5>
            <p id="alertMessage"></p>
            <div id="alertButtons" class="d-flex justify-content-center gap-2"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/check_auth.js"></script>
    <script src="js/alertAnimations.js"></script>
    <script src="js/alert.js"></script>
    <script src="js/get_cookie.js"></script>
    <script src="js/users.js"></script>

</body>

</html>
