<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="overflow-y-scroll">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-12 col-md-10 col-lg-8">

                <div class="tarjeta p-4">

                    <h2 class="main-title">Panel de Control</h2>
                    <p class="text-detail mb-4">Administración de películas y sistema</p>

                    <div class="d-grid gap-3 mb-4">

                        <button id="addMovieBtn" class="btn btn-primary">
                            + Añadir Película
                        </button>

                        <button id="usersListBtn" class="btn btn-soft">
                            👥 Ver Usuarios
                        </button>

                        <button id="mainPageBtn" class="btn btn-soft">
                            🎬 Web Principal
                        </button>

                        <button id="logoutBtn" class="btn btn-danger">
                            Cerrar sesión
                        </button>

                    </div>

                    <hr class="linea my-3">

                    <h5 class="text-center mb-3">Películas registradas</h5>

                    <div class="mb-3">
                        <input type="text" id="searchInput" class="form-control" placeholder="Buscar película...">
                    </div>

                    <div id="movieAdminList" class="row g-3"></div>

                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <button id="prevPage" class="btn btn-soft btn-sm">Anterior</button>
                        <button id="nextPage" class="btn btn-soft btn-sm">Siguiente</button>
                    </div>

                    <div class="text-center mt-2">
                        <span id="pageInfo" class="text-light"></span>
                    </div>

                    <div class="modal fade" id="editMovieModal" tabindex="-1">
                        <div class="modal-dialog">
                            <div class="modal-content card-auth">

                                <h5>Editar Película</h5>

                                <input id="editTitle" class="form-control mb-2" placeholder="Título">
                                <textarea id="editDescription" class="form-control mb-2"
                                    placeholder="Descripción"></textarea>
                                <input id="editReleaseDate" type="date" class="form-control mb-2">

                                <label>Imagen actual:</label>
                                <img id="currentPoster" style="width:100%; max-height:200px; object-fit:cover;"
                                    class="mb-2" />

                                <input id="editPoster" type="file" class="form-control mb-2">

                                <button id="saveEditMovieBtn" class="btn btn-success">Guardar cambios</button>

                            </div>
                        </div>
                    </div>

                </div>

            </div>

        </div>
    </div>
    </div>

    <div id="globalAlert" class="dlgOverlay" style="display:none;">
        <div id="alertBox" class="d-flex flex-column gap-2 text-center p-3 rounded-3">

            <h5 id="alertTitle" class="mb-1"></h5>
            <p id="alertMessage" class="mb-2"></p>

            <input type="text" id="alertInput" class="form-control" style="display:none;">

            <div id="alertButtons" class="d-flex justify-content-center gap-2">
                <!-- botones dinámicos -->
            </div>

        </div>
    </div>

    <div class="modal fade" id="movieModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content card-auth">

                <h5 id="modalTitle" class="modal-title">Nueva Película</h5>

                <input id="movieTitle" class="form-control mb-2" placeholder="Título">
                <textarea id="movieDescription" class="form-control mb-2" placeholder="Descripción"></textarea>
                <input id="movieDate" type="date" class="form-control mb-2">

                <input id="moviePoster" type="file" accept="image/*" class="form-control mb-2">

                <img id="posterPreview" style="max-width:100%; display:none; margin-bottom:10px;" />

                <div class="d-flex justify-content-end gap-2">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button id="saveMovieBtn" class="btn btn-primary">Guardar</button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/control.js"></script>
    <script src="js/check_auth.js"></script>
    <script src="js/alertAnimations.js"></script>
    <script src="js/alert.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/get_cookie.js"></script>
    <script src="js/deleteAccount.js"></script>

</body>

</html>
