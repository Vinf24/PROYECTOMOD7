<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta</title>
    <link rel="icon" type="image/png" sizes="16x16" href="img/icon-Alke-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/icon-Alke-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="img/icon-Alke-48.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="navbar nav-stack d-flex justify-content-end gap-2 px-3">
        <a href="index.html" class="btn btn-primary border border-light mt-1 surf" data-title="Menú Principal">Volver al
            Menú
            Principal</a>
    </div>

    <div class="container my-5">
        <div class="tarjeta p-4">

            <h2 class="main-title">Mi Cuenta</h2>
            <p class="text-detail text-center mb-4">Gestiona tu perfil y seguridad</p>

            <div class="mb-3">
                <label>Nombres</label>
                <input id="namesInput" class="form-control alert-input">
            </div>

            <div class="mb-3">
                <label>Apellidos</label>
                <input id="lastnamesInput" class="form-control alert-input">
            </div>

            <button id="saveBtn" class="btn btn-main w-75 mb-3 mx-auto d-block">
                Guardar cambios
            </button>

            <hr>

            <div class="text-center d-flex flex-column gap-2">

                <button id="changeEmailBtn" class="btn btn-soft">
                    Cambiar email
                </button>

                <button id="changePasswordBtn" class="btn btn-soft">
                    Cambiar contraseña
                </button>

                <button id="toggleMFA" class="btn btn-primary border border-light">
                    Activar / Desactivar MFA
                </button>

                <button id="deleteAccountBtn" class="btn btn-danger border border-light">
                    Eliminar cuenta
                </button>

                <button id="controlPanelBtn" class="btn btn-main d-none">
                    Panel de Control
                </button>
            </div>

        </div>
    </div>

    <div id="globalAlert" class="dlgOverlay" style="display:none;">
        <div id="alertBox" class="d-flex flex-column gap-2 text-center p-3 rounded-3">
            <h5 id="alertTitle"></h5>
            <p id="alertMessage"></p>
            <div id="alertButtons" class="d-flex justify-content-center gap-3 mt-2"></div>
        </div>
    </div>

    <script src="js/check_auth.js"></script>
    <script src="js/alertAnimations.js"></script>
    <script src="js/alert.js"></script>
    <script src="js/toggle_mfa.js"></script>
    <script src="js/get_cookie.js"></script>
    <script src="js/cuenta.js"></script>

</body>

</html>
